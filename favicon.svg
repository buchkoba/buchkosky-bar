<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <!-- Background -->
  <rect width="160" height="160" rx="14" fill="#0e0c0a"/>
  <!-- Outer border -->
  <rect x="1" y="1" width="158" height="158" rx="13" fill="none" stroke="#C49A3C" stroke-width="2"/>

  <!-- Top rule with center diamond -->
  <line x1="16" y1="28" x2="144" y2="28" stroke="#C49A3C" stroke-width="0.5" opacity="0.5"/>
  <polygon points="80,22 86,28 80,34 74,28" fill="#C49A3C" opacity="0.8"/>

  <!-- Bottom rule with center diamond (raised to make room for BAR) -->
  <line x1="16" y1="128" x2="144" y2="128" stroke="#C49A3C" stroke-width="0.5" opacity="0.5"/>
  <polygon points="80,122 86,128 80,134 74,128" fill="#C49A3C" opacity="0.8"/>

  <!-- Large italic B — ghost layer for depth -->
  <text x="80" y="83" text-anchor="middle" dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="92" font-weight="700" font-style="italic"
    fill="#C49A3C" opacity="0.12">B</text>
  <!-- Large italic B — main -->
  <text x="80" y="83" text-anchor="middle" dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="92" font-weight="700" font-style="italic"
    fill="#C49A3C">B</text>

  <!-- BAR label -->
  <text x="80" y="146" text-anchor="middle" dominant-baseline="central"
    font-family="'Courier New', monospace"
    font-size="11" font-weight="400" letter-spacing="5"
    fill="#C49A3C" opacity="0.65">BAR</text>
</svg>
